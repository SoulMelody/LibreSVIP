name: compile-files

on:
  push:
    branches:
      - main

jobs:
  compile-qt-resources:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            qml:
              - "**/*.qml"

      - name: Set up uv
        if: steps.changed-files.outputs.qml_any_changed == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Compile qt resources
        if: steps.changed-files.outputs.qml_any_changed == 'true'
        run: |
          uv venv
          uv pip install pyside6-addons
          cd scripts
          uv run python patch_qt_resource.py

      - name: Upload compiled resources
        if: steps.changed-files.outputs.qml_any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: qt-resources
          path: libresvip/res/resources.rcc

  compile-files:
    runs-on: ubuntu-latest
    needs: compile-qt-resources

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            po:
              - "**/LC_MESSAGES/*.po"
            qml:
              - "**/*.qml"
            requirements:
              - "pyproject.toml"
              - "uv.lock"
              - "packaging/requirements-desktop.in"
              - "packaging/requirements-mobile.in"
              - "packaging/requirements-pyinstaller.in"
            docs:
              - "docs/**"
              - "zensical.toml"

      - name: Set up uv
        if: steps.changed-files.outputs.po_any_changed == 'true' || steps.changed-files.outputs.requirements_any_changed == 'true' || steps.changed-files.outputs.docs_any_changed == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Compile catalogs
        if: steps.changed-files.outputs.po_any_changed == 'true'
        run: |
          uv venv
          uv pip install babel setuptools
          cd scripts
          uv run python batch_compile_catalog.py

      - name: Download compiled qt resources
        if: steps.changed-files.outputs.qml_any_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: qt-resources
          path: libresvip/res

      - name: Compile requirements.txt
        if: steps.changed-files.outputs.requirements_any_changed == 'true'
        run: |
          uv pip compile --universal --extra cli --extra desktop --extra crypto --extra ujson --extra lxml --extra yaml12  -U --python 3.10 --no-annotate --no-header pyproject.toml packaging/requirements-pyinstaller.in packaging/requirements-desktop.in --overrides packaging/requirements-desktop.in -o packaging/requirements-desktop.txt
          uv pip compile --python-platform aarch64-linux-android --index https://pypi.flet.dev --extra crypto --extra lxml --extra mobile --extra yaml12  -U --python-version 3.12 --no-annotate --no-header --index-strategy unsafe-first-match pyproject.toml --overrides packaging/requirements-mobile.in -o packaging/requirements-android.txt

      - name: Build docs
        if: steps.changed-files.outputs.docs_any_changed == 'true'
        run: |
          uv venv
          uv pip install zensical
          uv run zensical build

      - uses: JamesIves/github-pages-deploy-action@v4
        if: steps.changed-files.outputs.docs_any_changed == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: site

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: compile files
